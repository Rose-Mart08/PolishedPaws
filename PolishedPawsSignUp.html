<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polished Paws - Sign Up</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="PolishedPawsStyle.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .signup-container {
            max-width: 550px;
            margin: 80px auto;
        }

        .signup-box {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0px 8px 20px rgba(0, 0, 0, 0.15);
        }

        .signup-box h2 {
            font-family: 'Cinzel', serif;
            font-size: 1.9rem;
            text-align: center;
            margin-bottom: 20px;
            color: #2c2c2c;
        }

        .btn-signup {
            background-color: #000;
            color: #fff;
            padding: 12px;
            border-radius: 30px;
            font-weight: 500;
            transition: 0.3s ease;
        }

        .btn-signup:hover {
            background-color: #333;
        }

        .error-field {
            border: 2px solid red !important;
        }

        .error-text {
            color: red;
            font-size: 0.9rem;
            margin-top: 4px;
        }
    </style>
</head>

<body>

<header>
    <section class="header-content">
        <img src="PolPawlogo.png" alt="Polished Paws Logo" width="100" height="100">
        <div>
            <h1>Polished Paws</h1>
            <p style="font-style: italic;">Exclusive Animal Spa and Pet Boarding</p>
        </div>
    </section>
</header>

<nav class="main-nav">
    <a href="index.html">Home</a>
    <a href="#">About Us</a>
    <a href="#">Boarding</a>
    <a href="#">Cart</a>
    <a href="#">Products</a>
    <a href="#">Spa Packages</a>
    <a href="PolishedPawsSignUp.html">Sign Up</a>
    <a href="#">Contact</a>
</nav>

<main>
    <div class="container signup-container">
        <div class="signup-box">
            <h2>Create Your Account</h2>

            <form id="signupForm">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" id="password" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Confirm Password</label>
                    <input type="password" id="confirmPassword" class="form-control" required>
                </div>

                <button type="submit" class="btn btn-signup w-100">Sign Up</button>
            </form>
        </div>
    </div>
</main>

<footer>
    <p>
        <a href="#">Privacy Policy</a> |
        <a href="#">Terms of Use</a> |
        <a href="#">Copyright</a>
    </p>
    <p>&copy; 2026 Polished Paws. All rights reserved.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
<script>
const signupForm = document.getElementById("signupForm");
const username = signupForm.querySelector("input[type='text']");
const email = signupForm.querySelector("input[type='email']");
const password = document.getElementById("password");
const confirmPassword = document.getElementById("confirmPassword");

function showError(field, message) {
    field.classList.add("error-field");
    clearError(field); // remove old message
    const error = document.createElement("div");
    error.className = "error-text";
    error.textContent = message;
    field.parentNode.appendChild(error);
}

function clearError(field) {
    if (field.nextElementSibling && field.nextElementSibling.classList.contains("error-text")) {
        field.nextElementSibling.remove();
    }
}

function resetField(field) {
    field.classList.remove("error-field");
}

function validateField(field) {
    const value = field.value.trim();
    if (value === "") {
        showError(field, "This field is required");
        return false;
    }

    if (field.type === "email") {
        const pattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
        if (!pattern.test(value)) {
            showError(field, "Enter a valid email (joe@test.com)");
            return false;
        }
    }
    return true;
}

[username, email, password, confirmPassword].forEach(field => {
    field.addEventListener("blur", () => {
        validateField(field);
    });

    field.addEventListener("input", () => {
        resetField(field);
        clearError(field);
    });
});

signupForm.addEventListener("submit", function(e) {
    e.preventDefault();
    let isValid = true;

    [username, email, password, confirmPassword].forEach(field => {
        if (!validateField(field)) isValid = false;
    });

    if (password.value && confirmPassword.value && password.value !== confirmPassword.value) {
        showError(password, "Passwords do not match");
        showError(confirmPassword, "Passwords do not match");
        isValid = false;
    }

    if (isValid) {
        alert("Registration successful!");
        signupForm.reset();
    }
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polished Paws - Sign Up</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="PolishedPawsStyle.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<header>
    <section class="header-content">
        <img src="PolPawlogo.png" alt="Polished Paws Logo" width="100" height="100">
        <div>
            <h1>Polished Paws</h1>
            <p style="font-style: italic;">Exclusive Animal Spa and Pet Boarding</p>
        </div>
    </section>
</header>

<nav class="main-nav">
    <a href="index.html">Home</a>
    <a href="#">About Us</a>
    <a href="#">Boarding</a>
    <a href="#">Cart</a>
    <a href="#">Products</a>
    <a href="#">Spa Packages</a>
    <a href="PolishedPawsSignUp.html">Login</a>
    <a href="#">Contact</a>
</nav>

<main>
    <div class="container signup-container">
        <div class="card shadow p-4">
            <h2 class="text-center mb-4">Create Your Account</h2>

            <form id="signupForm">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" id="password" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Confirm Password</label>
                    <input type="password" id="confirmPassword" class="form-control" required>
                    <small id="errorMsg" class="text-danger"></small>
                </div>

                <button type="submit" class="btn btn-dark w-100">
                    Sign Up
                </button>
            </form>
        </div>
    </div>
</main>

<footer>
    <p>
        <a href="#">Privacy Policy</a> |
        <a href="#">Terms of Use</a> |
        <a href="#">Copyright</a>
    </p>
    <p>&copy; 2026 Polished Paws. All rights reserved.</p>
</footer>

<script>
document.getElementById("signupForm").addEventListener("submit", function(e) {
    e.preventDefault(); // Stop form from submitting

    let isValid = true;

    const username = document.querySelector("input[type='text']");
    const email = document.querySelector("input[type='email']");
    const password = document.getElementById("password");
    const confirmPassword = document.getElementById("confirmPassword");
    const errorMsg = document.getElementById("errorMsg");

    // Reset previous errors
    resetField(username);
    resetField(email);
    resetField(password);
    resetField(confirmPassword);
    errorMsg.textContent = "";

    // Required field checks
    if (username.value.trim() === "") {
        showError(username);
        isValid = false;
    }

    if (email.value.trim() === "") {
        showError(email);
        isValid = false;
    } else {
        // Email format validation
        const emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
        if (!email.value.match(emailPattern)) {
            showError(email);
            errorMsg.textContent = "Enter a valid email (example: joe@test.com)";
            isValid = false;
        }
    }

    if (password.value.trim() === "") {
        showError(password);
        isValid = false;
    }

    if (confirmPassword.value.trim() === "") {
        showError(confirmPassword);
        isValid = false;
    }

    // Password match check
    if (password.value !== confirmPassword.value) {
        showError(password);
        showError(confirmPassword);
        errorMsg.textContent = "Passwords do not match!";
        isValid = false;
    }

    if (isValid) {
        alert("Registration successful!");
        document.getElementById("signupForm").reset();
    }
});

// Highlight field red
function showError(field) {
    field.classList.add("error-field");
}

// Remove red highlight
function resetField(field) {
    field.classList.remove("error-field");
}

// Remove red while typing (live reset)
document.querySelectorAll("input").forEach(input => {
    input.addEventListener("input", function() {
        resetField(this);
        document.getElementById("errorMsg").textContent = "";
    });
});
</script>

</body>

</html>

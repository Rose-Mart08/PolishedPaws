<!DOCTYPE html>
<html lang="en" ng-app="billingApp">
<head>
    <meta charset="UTF-8">
    <title>Polished Paws - Billing</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <link rel="stylesheet" href="PolishedPawsStyle.css">
</head>
<body ng-controller="BillingController">
<nav class="main-nav d-flex justify-content-center gap-3 p-3 bg-light">
    <a href="index.html">Home</a>
    <a href="shoppingcart.html">Cart</a>
    <a href="product.html">Products</a>
    <a href="PolishedPawsSignUp.html">Login</a>
</nav>
<main class="container mt-5">
    <div class="card p-4 mx-auto" style="max-width: 600px;">
        <h2>Billing Details</h2>
        <form ng-submit="submitBilling()">
            <input type="text" ng-model="cardName" class="form-control mb-2" placeholder="Name on Card" required>
            <input type="text" ng-model="cardNumber" class="form-control mb-2" placeholder="Card Number" required>
            <button type="submit" class="btn btn-primary w-100">Submit Billing</button>
        </form>
    </div>
    <div id="jsonArea" class="mt-4" ng-show="showJSON">
        <h4>JSON Document (Sent to Team 06):</h4>
        <pre class="bg-light p-3 border">{{ billingJSON | json }}</pre>
    </div>
</main>
<script>
    angular.module('billingApp', []).controller('BillingController', function($scope) {
        $scope.submitBilling = function() {
            $scope.billingJSON = { cardName: $scope.cardName, cardNumber: $scope.cardNumber };
            $scope.showJSON = true;
            $.ajax({
                url: "http://130.203.136.203:3006/submit",
                type: "POST",
                contentType: "application/json",
                data: JSON.stringify($scope.billingJSON),
                success: function() { console.log("Success Team 06!"); }
            });
        };
    });
</script>
</body>
</html>
